<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reviewo Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#f2efe8;font-family:'DM Sans',sans-serif;min-height:100vh;padding:20px}
.container{max-width:1000px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid #1f1f1f}
.logo{font-family:'Fraunces',serif;font-size:24px;font-weight:900}
.logo span{color:#00e676}
.logout{background:transparent;color:#666;border:1px solid #1f1f1f;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px}
.welcome{font-family:'Fraunces',serif;font-size:28px;font-weight:900;margin-bottom:6px}
.welcome em{color:#00e676;font-style:italic}
.sub{color:#666;margin-bottom:28px;font-size:14px}
.main-tabs{display:flex;gap:6px;margin-bottom:24px;overflow-x:auto;padding-bottom:8px}
.main-tab{padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #1f1f1f;background:transparent;color:#f2efe8;white-space:nowrap;font-family:'DM Sans',sans-serif}
.main-tab.active{background:#00e676;color:#0a0a0a;border:none}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:#131313;border:1px solid #1f1f1f;border-radius:14px;padding:18px}
.stat-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.stat-value{font-family:'Fraunces',serif;font-size:28px;font-weight:900}
.stat-value.green{color:#00e676}
.stat-sub{font-size:12px;color:#666;margin-top:4px}
.card{background:#131313;border:1px solid #1f1f1f;border-radius:14px;padding:22px;margin-bottom:16px}
.card-title{font-family:'Fraunces',serif;font-size:16px;font-weight:700;margin-bottom:16px}
.btn{background:#00e676;color:#0a0a0a;border:none;padding:12px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:10px;font-family:'DM Sans',sans-serif}
.btn:disabled{opacity:.4}
.btn-gold{background:#f5c842;color:#0a0a0a}
.btn-ghost{background:transparent;color:#f2efe8;border:1px solid #1f1f1f}
.btn-danger{background:#ef4444;color:#fff}
.format-tabs{display:flex;gap:8px;margin-bottom:16px}
.format-tab{flex:1;padding:12px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #1f1f1f;background:transparent;color:#f2efe8;font-family:'DM Sans',sans-serif}
.format-tab.active{background:#00e676;color:#0a0a0a;border:none}
.format-info{font-size:12px;color:#888;text-align:center;margin-bottom:14px;padding:10px;background:#0a0a0a;border-radius:8px}
.poster-preview{background:#e5e5e5;border-radius:14px;padding:20px;margin-bottom:14px;display:flex;justify-content:center;overflow:hidden}
.poster-wrap{transform:scale(0.4);transform-origin:top center;margin-bottom:-60%}
.poster-wrap.small{transform:scale(0.7)}
.poster-a4{width:794px;height:1123px;background:#fff;padding:70px 60px;text-align:center;color:#0a0a0a;display:flex;flex-direction:column;justify-content:space-between;border-top:16px solid #f5c842}
.a4-eyebrow{font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:6px;color:#ff6b35;margin-bottom:30px}
.a4-biz{font-family:'Fraunces',serif;font-size:64px;font-weight:900;margin-bottom:16px;line-height:1.1;color:#0a0a0a;letter-spacing:-2px}
.a4-divider{width:100px;height:6px;background:#f5c842;margin:24px auto;border-radius:3px}
.a4-msg{font-size:30px;margin-bottom:36px;color:#333;font-weight:500;line-height:1.4}
.a4-msg strong{color:#0a0a0a;font-weight:800}
.a4-gift{background:#fff8e1;border:3px dashed #f5c842;border-radius:20px;padding:28px 20px;margin-bottom:40px;font-size:22px;font-weight:600}
.a4-gift .gift-emoji{font-size:48px;display:block;margin-bottom:12px}
.a4-gift strong{color:#ff6b35;font-size:28px;display:block;margin-top:8px}
.a4-qr-wrap{background:#fff;padding:16px;border-radius:16px;display:inline-block;border:3px solid #f0f0f0}
.a4-qr-wrap canvas{display:block;width:340px!important;height:340px!important}
.a4-scan{font-size:22px;color:#666;margin-top:20px;font-weight:600}
.a4-footer{margin-top:40px;padding-top:24px;border-top:2px solid #eee;font-size:16px;color:#aaa;letter-spacing:3px}
.a4-footer strong{color:#0a0a0a;letter-spacing:4px}
.poster-card{width:378px;height:567px;background:#fff;padding:32px 26px;text-align:center;color:#0a0a0a;display:flex;flex-direction:column;justify-content:space-between;border-top:8px solid #f5c842}
.card-biz{font-family:'Fraunces',serif;font-size:32px;font-weight:900;margin-bottom:8px;line-height:1.1;color:#0a0a0a}
.card-divider{width:50px;height:4px;background:#f5c842;margin:12px auto;border-radius:2px}
.card-msg{font-size:16px;margin-bottom:14px;color:#333;font-weight:500;line-height:1.3}
.card-msg strong{color:#0a0a0a;font-weight:800}
.card-gift{background:#fff8e1;border:2px dashed #f5c842;border-radius:12px;padding:14px 10px;margin-bottom:16px;font-size:14px;font-weight:600}
.card-gift strong{color:#ff6b35;font-size:15px;display:block;margin-top:4px}
.card-qr-wrap{background:#fff;padding:10px;border-radius:10px;display:inline-block;border:2px solid #f0f0f0}
.card-qr-wrap canvas{display:block;width:180px!important;height:180px!important}
.card-scan{font-size:13px;color:#666;margin-top:10px;font-weight:600}
.card-footer{margin-top:14px;padding-top:10px;border-top:1px solid #eee;font-size:10px;color:#aaa;letter-spacing:2px}
.card-footer strong{color:#0a0a0a;letter-spacing:2.5px}
.lot-box{background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.2);border-radius:12px;padding:18px;margin-bottom:14px}
.input{width:100%;background:#0a0a0a;border:1.5px solid #1f1f1f;border-radius:10px;padding:12px;color:#f2efe8;font-size:14px;outline:none;margin-bottom:10px;font-family:'DM Sans',sans-serif}
.input:focus{border-color:#00e676}
.input-label{font-size:12px;color:#888;display:block;margin-bottom:6px;margin-top:10px}
.lot-stats{display:flex;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid rgba(245,200,66,.15)}
.lot-count{font-family:'Fraunces',serif;font-size:22px;font-weight:900;color:#f5c842}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab-btn{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #1f1f1f;background:transparent;color:#f2efe8;font-family:'DM Sans',sans-serif}
.tab-btn.active{background:#00e676;color:#0a0a0a;border:none}
.review-google{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid #1f1f1f;align-items:center}
.review-google:last-child{border:none}
.review-avatar{width:40px;height:40px;border-radius:10px;background:#1f1f1f;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.review-interne{background:#1a1a1a;border-radius:12px;padding:16px;margin-bottom:10px;border-left:3px solid #ef4444}
.review-time{font-size:11px;color:#666}
.stars-display{font-size:16px}
.review-comment{font-size:14px;color:#f2efe8;line-height:1.6;font-style:italic;margin:10px 0;padding:12px;background:#0a0a0a;border-radius:8px;border-left:2px solid #ef4444}
.problem-tag{background:rgba(239,68,68,.15);color:#ef4444;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block;margin:2px}
.no-comment{font-size:12px;color:#666;font-style:italic;margin-top:8px}
.phone-info{font-size:12px;color:#888;margin-top:4px}
.winner-box{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.3);border-radius:12px;padding:18px;margin-top:14px;text-align:center}
.winner-title{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:#00e676;margin-bottom:8px}
.winner-phone{font-family:monospace;font-size:20px;font-weight:700}
.empty{text-align:center;padding:40px;color:#666}
.loading{text-align:center;padding:40px;color:#666}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1f1f1f;font-size:13px}
.info-row .label{color:#666}
.sub-hero{background:linear-gradient(135deg,rgba(0,230,118,.08),rgba(0,230,118,.02));border:1px solid rgba(0,230,118,.3);border-radius:14px;padding:22px;margin-bottom:16px}
.sub-hero.expired{background:linear-gradient(135deg,rgba(239,68,68,.08),rgba(239,68,68,.02));border-color:rgba(239,68,68,.3)}
.sub-hero.trial{background:linear-gradient(135deg,rgba(245,200,66,.08),rgba(245,200,66,.02));border-color:rgba(245,200,66,.3)}
.sub-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
.sub-badge.active{background:#00e676;color:#0a0a0a}
.sub-badge.trial{background:#f5c842;color:#0a0a0a}
.sub-badge.expired{background:#ef4444;color:#fff}
.sub-title{font-family:'Fraunces',serif;font-size:22px;font-weight:900;margin-bottom:8px}
.sub-detail{color:#aaa;font-size:14px;margin-bottom:4px}
.sub-detail strong{color:#f2efe8}
.danger-zone{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:18px;margin-top:20px}
.danger-zone-title{color:#ef4444;font-weight:700;font-size:14px;margin-bottom:8px}
.danger-zone-desc{color:#888;font-size:13px;margin-bottom:12px;line-height:1.5}
@media(max-width:768px){.stats-grid{grid-template-columns:1fr 1fr}.poster-wrap{transform:scale(0.3);margin-bottom:-70%}.poster-wrap.small{transform:scale(0.5);margin-bottom:-30%}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div class="logo">Reviewo<span>.</span></div>
<button class="logout" onclick="logout()">Deconnexion</button>
</div>
<div id="content" class="loading">Chargement...</div>
</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient('https://xivfhmivalfcnbkvxwbm.supabase.co','sb_publishable_Czi3OLTboQSGmP2nA0NBUQ_koXPrn5x')
let commerce=null,avis=[],session=null
async function load(){
  const {data:{session:s}}=await supabase.auth.getSession()
  if(!s){window.location.href='/inscription.html';return}
  session=s
  const {data:c}=await supabase.from('commerces').select('*').eq('user_id',s.user.id).single()
  if(!c){document.getElementById('content').innerHTML='Commerce introuvable';return}
  commerce=c
  const {data:a}=await supabase.from('avis').select('*').eq('commerce_id',c.id).order('created_at',{ascending:false})
  avis=a||[]
  render()
}
async function render(){
  const total=avis.length
  const gc=avis.filter(a=>a.redirige_google).length
  const avg=total>0?(avis.reduce((s,a)=>s+a.note,0)/total).toFixed(1):'-'
  const rate=total>0?Math.round((gc/total)*100):0
  const voteLink=window.location.origin+'/vote.html?c='+commerce.id
  const month=new Date().toLocaleDateString('fr-FR',{month:'long',year:'numeric'})
  const elig=avis.filter(a=>a.redirige_google&&a.telephone)
  const googleAvis=avis.filter(a=>a.redirige_google)
  const interneAvis=avis.filter(a=>!a.redirige_google)
  const {data:tirages}=await supabase.from('tirages').select('*').eq('commerce_id',commerce.id).order('created_at',{ascending:false})
  const lt=tirages&&tirages[0]
  let h='<h1 class="welcome">Bienvenue, <em>'+commerce.nom+'</em></h1>'
  h+='<p class="sub">Tableau de bord - '+month+'</p>'
  h+='<div class="main-tabs">'
  h+='<button class="main-tab active" id="mt-overview" onclick="showMainTab(\'overview\')">📊 Apercu</button>'
  h+='<button class="main-tab" id="mt-affiches" onclick="showMainTab(\'affiches\')">🎨 Affiches</button>'
  h+='<button class="main-tab" id="mt-avis" onclick="showMainTab(\'avis\')">⭐ Avis</button>'
  h+='<button class="main-tab" id="mt-tirage" onclick="showMainTab(\'tirage\')">🎁 Tirage</button>'
  h+='<button class="main-tab" id="mt-profil" onclick="showMainTab(\'profil\')">⚙️ Profil</button>'
  h+='</div>'
  // APERCU
  h+='<div id="section-overview">'
  h+='<div class="stats-grid">'
  h+='<div class="stat"><div class="stat-label">Avis collectes</div><div class="stat-value">'+total+'</div><div class="stat-sub">Depuis le debut</div></div>'
  h+='<div class="stat"><div class="stat-label">Rediriges Google</div><div class="stat-value green">'+gc+'</div><div class="stat-sub">'+rate+'%</div></div>'
  h+='<div class="stat"><div class="stat-label">Note moyenne</div><div class="stat-value">'+avg+'</div><div class="stat-sub">Sur 5</div></div>'
  h+='<div class="stat"><div class="stat-label">Plan</div><div class="stat-value green" style="font-size:22px">'+commerce.plan+'</div><div class="stat-sub">Actif</div></div>'
  h+='</div>'
  h+='<div class="card"><div class="card-title">📘 Besoin d aide ?</div>'
  h+='<p style="color:#aaa;font-size:14px;line-height:1.6">Consultez notre guide complet qui explique tout de A a Z : comment parler aux clients, choisir le lot, placer les affiches...</p>'
  h+='<a href="/guide.html" target="_blank"><button class="btn">📖 Lire le guide complet</button></a>'
  h+='</div>'
  h+='</div>'
  // AFFICHES
  h+='<div id="section-affiches" style="display:none">'
  h+='<div class="card"><div class="card-title">Vos affiches Reviewo</div>'
  h+='<div class="format-tabs">'
  h+='<button class="format-tab active" id="fmt-a4" onclick="showFormat(\'a4\')">📄 A4 (21x29,7 cm)</button>'
  h+='<button class="format-tab" id="fmt-card" onclick="showFormat(\'card\')">🎴 Table (10x15 cm)</button>'
  h+='</div>'
  h+='<div id="format-a4-box">'
  h+='<div class="format-info">Format A4 standard - A imprimer sur papier A4</div>'
  h+='<div class="poster-preview"><div class="poster-wrap"><div class="poster-a4" id="poster-a4">'
  h+='<div><div class="a4-eyebrow">Votre avis compte</div><div class="a4-biz">'+commerce.nom+'</div><div class="a4-divider"></div>'
  h+='<div class="a4-msg">Aidez-nous a nous ameliorer<br>en <strong>30 secondes</strong></div>'
  h+='<div class="a4-gift"><span class="gift-emoji">🎁</span>Laissez un avis et tentez de gagner<strong>'+(commerce.lot||'un cadeau')+'</strong></div></div>'
  h+='<div><div class="a4-qr-wrap"><canvas id="qr-a4"></canvas></div><div class="a4-scan">📱 Scannez avec votre telephone</div></div>'
  h+='<div class="a4-footer">Propulse par <strong>REVIEWO</strong></div>'
  h+='</div></div></div>'
  h+='<button class="btn" onclick="downloadA4()">📥 Telecharger l affiche A4</button>'
  h+='</div>'
  h+='<div id="format-card-box" style="display:none">'
  h+='<div class="format-info">Format 10x15 cm - Parfait pour les tables</div>'
  h+='<div class="poster-preview"><div class="poster-wrap small"><div class="poster-card" id="poster-card">'
  h+='<div><div class="card-biz">'+commerce.nom+'</div><div class="card-divider"></div>'
  h+='<div class="card-msg">Votre avis compte !<br>En <strong>30 secondes</strong></div>'
  h+='<div class="card-gift">🎁 Tentez de gagner<strong>'+(commerce.lot||'un cadeau')+'</strong></div></div>'
  h+='<div><div class="card-qr-wrap"><canvas id="qr-card"></canvas></div><div class="card-scan">📱 Scannez-moi</div></div>'
  h+='<div class="card-footer">Propulse par <strong>REVIEWO</strong></div>'
  h+='</div></div></div>'
  h+='<button class="btn" onclick="downloadCard()">📥 Telecharger la carte</button>'
  h+='</div></div></div>'
  // AVIS
  h+='<div id="section-avis" style="display:none">'
  h+='<div class="card"><div class="card-title">Avis recus</div>'
  h+='<div class="tabs">'
  h+='<button class="tab-btn active" id="tab-google-btn" onclick="showTab(\'google\')">Google ('+googleAvis.length+')</button>'
  h+='<button class="tab-btn" id="tab-interne-btn" onclick="showTab(\'interne\')">A ameliorer ('+interneAvis.length+')</button>'
  h+='</div>'
  h+='<div id="tab-google">'
  if(googleAvis.length===0){h+='<div class="empty">Aucun avis Google pour le moment</div>'}
  else{googleAvis.slice(0,20).forEach(a=>{
    const stars='⭐'.repeat(a.note)
    const d=new Date(a.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})
    h+='<div class="review-google"><div class="review-avatar">😊</div><div style="flex:1">'
    h+='<div style="display:flex;justify-content:space-between;align-items:center"><span class="stars-display">'+stars+'</span><span class="review-time">'+d+'</span></div>'
    if(a.telephone)h+='<div class="phone-info">📞 '+a.telephone+'</div>'
    h+='</div></div>'
  })}
  h+='</div>'
  h+='<div id="tab-interne" style="display:none">'
  if(interneAvis.length===0){h+='<div class="empty">Aucun retour negatif - bravo !</div>'}
  else{interneAvis.slice(0,20).forEach(a=>{
    const stars='⭐'.repeat(a.note)+'☆'.repeat(5-a.note)
    const d=new Date(a.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})
    const emoji=a.note>=3?'😐':'😞'
    h+='<div class="review-interne">'
    h+='<div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;gap:10px;align-items:center"><span style="font-size:22px">'+emoji+'</span><span class="stars-display">'+stars+'</span></div><span class="review-time">'+d+'</span></div>'
    if(a.commentaire&&a.commentaire.trim()!==''){h+='<div class="review-comment">"'+a.commentaire+'"</div>'}
    else{h+='<div class="no-comment">Pas de commentaire laisse</div>'}
    if(a.problemes&&a.problemes.length>0){
      h+='<div style="margin-top:8px"><div style="font-size:11px;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Problemes signales</div>'
      a.problemes.forEach(p=>{h+='<span class="problem-tag">'+p+'</span>'})
      h+='</div>'
    }
    h+='</div>'
  })}
  h+='</div></div></div>'
  // TIRAGE
  h+='<div id="section-tirage" style="display:none">'
  h+='<div class="card"><div class="card-title">Tirage au sort mensuel</div>'
  h+='<div class="lot-box">'
  h+='<label class="input-label">Lot a faire gagner</label>'
  h+='<input type="text" class="input" id="lot-input" value="'+(commerce.lot||'')+'" placeholder="Bon achat 50 euros">'
  h+='<button class="btn btn-ghost" style="width:auto;padding:8px 14px;font-size:12px;margin-top:0" onclick="saveLot()">Enregistrer</button>'
  h+='<div class="lot-stats"><span style="font-size:13px;color:#888">Participants eligibles</span><span class="lot-count">'+elig.length+'</span></div>'
  h+='</div>'
  h+='<button class="btn btn-gold" onclick="doTirage()"'+(elig.length===0?' disabled':'')+'>'+(elig.length===0?'Aucun participant':'Lancer le tirage')+'</button>'
  if(lt){h+='<div class="winner-box"><div class="winner-title">Dernier gagnant</div><div class="winner-phone">'+lt.telephone_gagnant+'</div><div style="font-size:12px;color:#666;margin-top:6px">Lot: '+lt.lot+'</div></div>'}
  h+='</div></div>'
  // PROFIL
  const now=new Date()
  const trialEnd=commerce.trial_end?new Date(commerce.trial_end):null
  const daysLeft=trialEnd?Math.ceil((trialEnd-now)/(1000*60*60*24)):0
  let subClass='trial',subBadge='trial',subLabel='Essai gratuit',subDetails=''
  if(commerce.statut==='active'){
    subClass='active';subBadge='active';subLabel='Abonnement actif'
    subDetails='<div class="sub-detail">Montant mensuel : <strong>'+(commerce.montant_mensuel||29)+'€/mois</strong></div>'
    if(commerce.date_abonnement)subDetails+='<div class="sub-detail">Abonne depuis le <strong>'+new Date(commerce.date_abonnement).toLocaleDateString('fr-FR')+'</strong></div>'
  }else if(commerce.statut==='cancelled'){
    subClass='expired';subBadge='expired';subLabel='Abonnement annule'
    subDetails='<div class="sub-detail">Vous pouvez vous reabonner a tout moment</div>'
  }else if(daysLeft>0){
    subDetails='<div class="sub-detail">Il vous reste <strong>'+daysLeft+' jour(s)</strong> d essai</div>'
    if(trialEnd)subDetails+='<div class="sub-detail">Fin de l essai : <strong>'+trialEnd.toLocaleDateString('fr-FR')+'</strong></div>'
    subDetails+='<div class="sub-detail">Apres : <strong>'+(commerce.montant_mensuel||29)+'€/mois</strong></div>'
  }else{
    subClass='expired';subBadge='expired';subLabel='Essai expire'
    subDetails='<div class="sub-detail">Votre essai a pris fin. Abonnez-vous pour continuer.</div>'
  }
  h+='<div id="section-profil" style="display:none">'
  // Abonnement
  h+='<div class="sub-hero '+subClass+'">'
  h+='<span class="sub-badge '+subBadge+'">'+subLabel+'</span>'
  h+='<div class="sub-title">Mon abonnement</div>'
  h+=subDetails
  if(commerce.statut!=='active'&&daysLeft<=0){h+='<button class="btn" style="margin-top:14px" onclick="alert(\'Stripe sera bientot disponible !\')">S abonner maintenant</button>'}
  h+='</div>'
  // Profil
  h+='<div class="card"><div class="card-title">👤 Informations du commerce</div>'
  h+='<label class="input-label">Nom du commerce</label>'
  h+='<input type="text" class="input" id="edit-nom" value="'+(commerce.nom||'')+'">'
  h+='<label class="input-label">Email</label>'
  h+='<input type="email" class="input" id="edit-email" value="'+(commerce.email||'')+'">'
  h+='<label class="input-label">Telephone</label>'
  h+='<input type="tel" class="input" id="edit-tel" value="'+(commerce.telephone||'')+'" placeholder="06 12 34 56 78">'
  h+='<label class="input-label">Lien Google (URL pour laisser un avis)</label>'
  h+='<input type="url" class="input" id="edit-google" value="'+(commerce.lien_google||'')+'" placeholder="https://g.page/...">'
  h+='<button class="btn" onclick="saveProfile()">💾 Enregistrer les modifications</button>'
  h+='</div>'
  // Mot de passe
  h+='<div class="card"><div class="card-title">🔒 Changer mon mot de passe</div>'
  h+='<label class="input-label">Nouveau mot de passe (minimum 6 caracteres)</label>'
  h+='<input type="password" class="input" id="new-pwd" placeholder="Nouveau mot de passe">'
  h+='<label class="input-label">Confirmer le nouveau mot de passe</label>'
  h+='<input type="password" class="input" id="new-pwd2" placeholder="Confirmer">'
  h+='<button class="btn btn-ghost" onclick="changePassword()">Mettre a jour le mot de passe</button>'
  h+='</div>'
  // Zone dangereuse
  h+='<div class="card"><div class="card-title" style="color:#ef4444">⚠️ Zone dangereuse</div>'
  if(commerce.statut==='active'){
    h+='<div class="danger-zone">'
    h+='<div class="danger-zone-title">Se desabonner</div>'
    h+='<div class="danger-zone-desc">Votre abonnement sera annule. Vous perdrez acces a Reviewo a la fin de votre periode en cours. Vos donnees (avis, statistiques) seront conservees 30 jours au cas ou vous vous reabonnez.</div>'
    h+='<button class="btn btn-danger" onclick="unsubscribe()">Annuler mon abonnement</button>'
    h+='</div>'
  }
  h+='<div class="danger-zone" style="margin-top:10px">'
  h+='<div class="danger-zone-title">Supprimer mon compte definitivement</div>'
  h+='<div class="danger-zone-desc">Toutes vos donnees seront supprimees : avis, statistiques, commerce, compte utilisateur. Cette action est <strong>irreversible</strong>.</div>'
  h+='<button class="btn btn-danger" onclick="deleteAccount()">Supprimer mon compte</button>'
  h+='</div>'
  h+='</div>'
  h+='</div>'
  document.getElementById('content').innerHTML=h
  setTimeout(()=>{
    const qrA4=document.getElementById('qr-a4')
    const qrCard=document.getElementById('qr-card')
    if(qrA4)QRCode.toCanvas(qrA4,voteLink,{width:340,margin:1,errorCorrectionLevel:'H'})
    if(qrCard)QRCode.toCanvas(qrCard,voteLink,{width:180,margin:1,errorCorrectionLevel:'H'})
  },100)
}
window.showMainTab=function(tab){
  ['overview','affiches','avis','tirage','profil'].forEach(t=>{
    const sec=document.getElementById('section-'+t)
    const btn=document.getElementById('mt-'+t)
    if(sec)sec.style.display=t===tab?'block':'none'
    if(btn)btn.classList.toggle('active',t===tab)
  })
}
window.showFormat=function(f){
  document.getElementById('format-a4-box').style.display=f==='a4'?'block':'none'
  document.getElementById('format-card-box').style.display=f==='card'?'block':'none'
  document.getElementById('fmt-a4').classList.toggle('active',f==='a4')
  document.getElementById('fmt-card').classList.toggle('active',f==='card')
}
window.showTab=function(tab){
  document.getElementById('tab-google').style.display=tab==='google'?'block':'none'
  document.getElementById('tab-interne').style.display=tab==='interne'?'block':'none'
  document.getElementById('tab-google-btn').classList.toggle('active',tab==='google')
  document.getElementById('tab-interne-btn').classList.toggle('active',tab==='interne')
}
window.downloadA4=async function(){
  const p=document.getElementById('poster-a4')
  const c=await html2canvas(p,{scale:2,backgroundColor:'#ffffff',width:794,height:1123,windowWidth:794,windowHeight:1123})
  const l=document.createElement('a')
  l.download='reviewo-affiche-A4.png'
  l.href=c.toDataURL('image/png')
  l.click()
}
window.downloadCard=async function(){
  const p=document.getElementById('poster-card')
  const c=await html2canvas(p,{scale:2,backgroundColor:'#ffffff',width:378,height:567,windowWidth:378,windowHeight:567})
  const l=document.createElement('a')
  l.download='reviewo-carte-table.png'
  l.href=c.toDataURL('image/png')
  l.click()
}
window.saveLot=async function(){
  const nl=document.getElementById('lot-input').value.trim()
  if(!nl)return alert('Saisir un lot')
  const {error}=await supabase.from('commerces').update({lot:nl}).eq('id',commerce.id)
  if(error)return alert('Erreur')
  commerce.lot=nl
  alert('Lot enregistre')
  render()
}
window.saveProfile=async function(){
  const nom=document.getElementById('edit-nom').value.trim()
  const email=document.getElementById('edit-email').value.trim()
  const tel=document.getElementById('edit-tel').value.trim()
  const google=document.getElementById('edit-google').value.trim()
  if(!nom||!email)return alert('Le nom et l email sont obligatoires')
  const {error}=await supabase.from('commerces').update({nom:nom,email:email,telephone:tel||null,lien_google:google||null}).eq('id',commerce.id)
  if(error)return alert('Erreur : '+error.message)
  if(email!==commerce.email){
    const {error:err2}=await supabase.auth.updateUser({email:email})
    if(err2)alert('Email commerce mis a jour, mais erreur email connexion : '+err2.message)
  }
  commerce.nom=nom;commerce.email=email;commerce.telephone=tel;commerce.lien_google=google
  alert('✅ Modifications enregistrees !')
  render()
}
window.changePassword=async function(){
  const p1=document.getElementById('new-pwd').value
  const p2=document.getElementById('new-pwd2').value
  if(!p1||p1.length<6)return alert('Le mot de passe doit faire au moins 6 caracteres')
  if(p1!==p2)return alert('Les mots de passe ne correspondent pas')
  const {error}=await supabase.auth.updateUser({password:p1})
  if(error)return alert('Erreur : '+error.message)
  alert('✅ Mot de passe mis a jour !')
  document.getElementById('new-pwd').value=''
  document.getElementById('new-pwd2').value=''
}
window.unsubscribe=async function(){
  if(!confirm('Etes-vous sur de vouloir annuler votre abonnement ?\n\nVous conserverez l acces jusqu a la fin de votre periode en cours.'))return
  const reason=prompt('Pour nous aider a nous ameliorer, pouvez-vous nous dire pourquoi vous partez ? (optionnel)')
  const {error}=await supabase.from('commerces').update({statut:'cancelled'}).eq('id',commerce.id)
  if(error)return alert('Erreur : '+error.message)
  alert('Abonnement annule. Nous sommes desoles de vous voir partir 😢')
  load()
}
window.deleteAccount=async function(){
  if(!confirm('⚠️ ATTENTION\n\nSupprimer votre compte supprimera DEFINITIVEMENT :\n- Tous vos avis\n- Toutes vos statistiques\n- Votre commerce\n- Votre compte\n\nCette action est IRREVERSIBLE. Continuer ?'))return
  const confirmText=prompt('Pour confirmer, tapez : SUPPRIMER')
  if(confirmText!=='SUPPRIMER')return alert('Suppression annulee')
  await supabase.from('avis').delete().eq('commerce_id',commerce.id)
  await supabase.from('tirages').delete().eq('commerce_id',commerce.id)
  await supabase.from('clients').delete().eq('commerce_id',commerce.id)
  await supabase.from('commerces').delete().eq('id',commerce.id)
  await supabase.auth.signOut()
  alert('Compte supprime. Au revoir !')
  window.location.href='/'
}
window.doTirage=async function(){
  const elig=avis.filter(a=>a.redirige_google&&a.telephone)
  if(elig.length===0)return alert('Aucun participant')
  if(!confirm('Lancer le tirage parmi '+elig.length+' participants?'))return
  const w=elig[Math.floor(Math.random()*elig.length)]
  const m=new Date().toLocaleDateString('fr-FR',{month:'long',year:'numeric'})
  const {error}=await supabase.from('tirages').insert({commerce_id:commerce.id,avis_id:w.id,lot:commerce.lot||'Lot',telephone_gagnant:w.telephone,mois:m})
  if(error)return alert('Erreur')
  alert('Gagnant: '+w.telephone)
  load()
}
window.logout=async function(){
  await supabase.auth.signOut()
  window.location.href='/inscription.html'
}
load()
</script>
