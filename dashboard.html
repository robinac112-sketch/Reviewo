<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

async function load(){
  const {data:{session}}=await supabase.auth.getSession()
  if(!session){window.location.href='/inscription.html';return}
  const {data:c}=await supabase.from('commerces').select('*').eq('user_id',session.user.id).single()
  if(!c){document.getElementById('content').innerHTML='Commerce introuvable';return}
  commerce=c
  const {data:a}=await supabase.from('avis').select('*').eq('commerce_id',c.id).order('created_at',{ascending:false})
  avis=a||[]
  const {data:p}=await supabase.from('parrainages').select('*, commerces!parrainages_filleul_id_fkey(nom,statut)').eq('parrain_id',c.id)
  parrainages=p||[]
  const now=new Date()
  const trialEnd=c.trial_end?new Date(c.trial_end):null
  const isTrialValid=trialEnd&&trialEnd>now
  const isActive=c.statut==='active'
  const isCancelled=c.statut==='cancelled'
  if(isCancelled||(!isActive&&!isTrialValid)){
    renderBlocked()
    return
  }
  render()
}

async function checkPayment(){
  const p=new URLSearchParams(window.location.search)
  if(p.get('success')==='true'&&commerce){
    const trialEnd=new Date()
    trialEnd.setDate(trialEnd.getDate()+7)

    if(commerce.parraine_par){
      await supabase.from('parrainages').update({filleul_abonne:true,reduction_parrain_active:true,reduction_filleul_active:true}).eq('filleul_id',commerce.id)

    if(!error){alert('🎉 Abonnement actif ! Un email de confirmation vient de vous être envoyé.');window.history.replaceState({},'',window.location.pathname);load()}
  }
}

function loadQRImage(text,size){
  return new Promise((resolve,reject)=>{
    const img=new Image()
    img.crossOrigin='anonymous'
    img.onload=()=>resolve(img)
    img.onerror=reject
    img.src='https://api.qrserver.com/v1/create-qr-code/?size='+size+'x'+size+'&margin=2&ecc=H&data='+encodeURIComponent(text)
  })
}

function wrap(ctx,text,maxW){
  const words=(text||'').split(' '),lines=[]
  let cur=''
  words.forEach(w=>{
    const t=cur?cur+' '+w:w
    if(ctx.measureText(t).width<=maxW)cur=t
    else{if(cur)lines.push(cur);cur=w}
  })
  if(cur)lines.push(cur)
  return lines
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath()
  ctx.moveTo(x+r,y)
  ctx.arcTo(x+w,y,x+w,y+h,r)
  ctx.arcTo(x+w,y+h,x,y+h,r)
  ctx.arcTo(x,y+h,x,y,r)
  ctx.arcTo(x,y,x+w,y,r)
  ctx.closePath()
}

async function render(){
  const total=avis.length
  const gc=avis.filter(a=>a.redirige_google).length
  const avg=total>0?(avis.reduce((s,a)=>s+a.note,0)/total).toFixed(1):'-'
  const rate=total>0?Math.round((gc/total)*100):0
  const month=new Date().toLocaleDateString('fr-FR',{month:'long',year:'numeric'})
  const elig=avis.filter(a=>a.redirige_google&&a.telephone&&a.consent_concours)
  const googleAvis=avis.filter(a=>a.redirige_google)
  const interneAvis=avis.filter(a=>!a.redirige_google)

window.saveLot=async function(){
  const nl=document.getElementById('lot-input').value.trim()
  if(!nl)return alert('Saisir un lot')
  const {error}=await supabase.from('commerces').update({lot:nl}).eq('id',commerce.id)
  if(error)return alert('Erreur')
  commerce.lot=nl
  alert('Lot enregistre')
  render()
}
window.saveProfile=async function(){
  const nom=document.getElementById('edit-nom').value.trim()
  const email=document.getElementById('edit-email').value.trim()
  const tel=document.getElementById('edit-tel').value.trim()
  const google=document.getElementById('edit-google').value.trim()
  if(!nom||!email)return alert('Nom et email obligatoires')
  const {error}=await supabase.from('commerces').update({nom:nom,email:email,telephone:tel||null,lien_google:google||null}).eq('id',commerce.id)
  if(error)return alert('Erreur')
  commerce.nom=nom;commerce.email=email;commerce.telephone=tel;commerce.lien_google=google
  alert('✅ Enregistre')
  render()
}
window.changePassword=async function(){
  const p1=document.getElementById('new-pwd').value

window.deleteAccount=async function(){
  if(!confirm('⚠️ Supprimer DEFINITIVEMENT ?'))return
  if(prompt('Tapez SUPPRIMER')!=='SUPPRIMER')return
  await supabase.from('avis').delete().eq('commerce_id',commerce.id)
  await supabase.from('tirages').delete().eq('commerce_id',commerce.id)
  await supabase.from('clients').delete().eq('commerce_id',commerce.id)
  await supabase.from('parrainages').delete().eq('parrain_id',commerce.id)
  await supabase.from('parrainages').delete().eq('filleul_id',commerce.id)
  await supabase.from('commerces').delete().eq('id',commerce.id)
  await supabase.auth.signOut()
  window.location.href='/'

window.doTirage=async function(){
  const elig=avis.filter(a=>a.redirige_google&&a.telephone&&a.consent_concours)
  if(elig.length===0)return alert('Aucun participant')
  const overlay=document.getElementById('roulette-overlay')
  const display=document.getElementById('roulette-display')
  const closeBtn=document.getElementById('roulette-close')
  const lotDiv=document.getElementById('roulette-lot')
  const lotText=document.getElementById('roulette-lot-text')
  overlay.classList.add('active')
  closeBtn.classList.remove('active')
  display.classList.add('roulette-spinning')
  display.classList.remove('roulette-winner')
  display.textContent='- - -'
  lotDiv.style.display='none'
  const duration=3500
  const interval=80
  const start=Date.now()
  const spin=setInterval(()=>{
    const random=elig[Math.floor(Math.random()*elig.length)]
    display.textContent=random.telephone
    if(Date.now()-start>=duration){
      clearInterval(spin)
      const winner=elig[Math.floor(Math.random()*elig.length)]
      display.textContent=winner.telephone
      display.classList.remove('roulette-spinning')
      display.classList.add('roulette-winner')
      lotText.textContent=commerce.lot||'Lot'
      lotDiv.style.display='block'
      closeBtn.classList.add('active')
      supabase.from('tirages').insert({
        commerce_id:commerce.id,avis_id:winner.id,lot:commerce.lot||'Lot',
        telephone_gagnant:winner.telephone,
        mois:new Date().toLocaleDateString('fr-FR',{month:'long',year:'numeric'})
      })
    }
  },interval)
}
window.closeRoulette=function(){
  document.getElementById('roulette-overlay').classList.remove('active')
  load()
}
