<script>
const supabase=window.supabase.createClient('https://xivfhmivalfcnbkvxwbm.supabase.co','sb_publishable_Czi3OLTboQSGmP2nA0NBUQ_koXPrn5x')
const STRIPE_LINK='https://buy.stripe.com/test_6oU3cu4cLcb87Mu9o53Ru00'
let commerce=null,avis=[]

async function load(){
  const {data:{session}}=await supabase.auth.getSession()
  if(!session){window.location.href='/inscription.html';return}
  const {data:c}=await supabase.from('commerces').select('*').eq('user_id',session.user.id).single()

  commerce=c
  const {data:a}=await supabase.from('avis').select('*').eq('commerce_id',c.id).order('created_at',{ascending:false})
  avis=a||[]
  render()
}

async function checkPayment(){
  const p=new URLSearchParams(window.location.search)
  if(p.get('success')==='true'&&commerce){
    const {error}=await supabase.from('commerces').update({statut:'active',date_abonnement:new Date().toISOString(),montant_mensuel:29}).eq('id',commerce.id)
    if(!error){alert('🎉 Abonnement actif !');window.history.replaceState({},'',window.location.pathname);load()}
  }
}

// Charge le QR code comme une image (methode ULTRA fiable)
function loadQRImage(text,size){
  return new Promise((resolve,reject)=>{
    const img=new Image()
    img.crossOrigin='anonymous'
    img.onload=()=>resolve(img)
    img.onerror=reject
    // Utilise l API publique qrserver qui retourne un PNG direct
    img.src='https://api.qrserver.com/v1/create-qr-code/?size='+size+'x'+size+'&margin=2&ecc=H&data='+encodeURIComponent(text)
  })
}

function wrap(ctx,text,maxW){
  const words=(text||'').split(' '),lines=[]
  let cur=''
  words.forEach(w=>{
    const t=cur?cur+' '+w:w
    if(ctx.measureText(t).width<=maxW)cur=t
    else{if(cur)lines.push(cur);cur=w}
  })
  if(cur)lines.push(cur)
  return lines
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath()
  ctx.moveTo(x+r,y)
  ctx.arcTo(x+w,y,x+w,y+h,r)
  ctx.arcTo(x+w,y+h,x,y+h,r)
  ctx.arcTo(x,y+h,x,y,r)
  ctx.arcTo(x,y,x+w,y,r)
  ctx.closePath()
}

async function drawA4(targetCanvas){
  const W=1240,H=1754
  const canvas=targetCanvas||document.createElement('canvas')
  canvas.width=W;canvas.height=H
  const ctx=canvas.getContext('2d')
  const voteLink=window.location.origin+'/vote.html?c='+commerce.id
  // CHARGER LE QR CODE EN PREMIER
  const qrImg=await loadQRImage(voteLink,520)
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H)
  ctx.fillStyle='#f5c842';ctx.fillRect(0,0,W,24)
  ctx.textAlign='center'
  ctx.fillStyle='#ff6b35'
  ctx.font='bold 28px "DM Sans",Arial'
  ctx.fillText('VOTRE AVIS COMPTE',W/2,130)
  ctx.fillStyle='#0a0a0a'
  ctx.font='900 90px "Fraunces",Georgia,serif'
  const nomLines=wrap(ctx,commerce.nom,W-160)
  let y=230
  nomLines.forEach(l=>{ctx.fillText(l,W/2,y);y+=100})
  ctx.fillStyle='#f5c842'
  ctx.fillRect(W/2-60,y,120,8)
  y+=60
  ctx.fillStyle='#333';ctx.font='500 40px "DM Sans",Arial'
  ctx.fillText('Aidez-nous a nous ameliorer',W/2,y+40)
  ctx.fillStyle='#0a0a0a';ctx.font='800 46px "DM Sans",Arial'
  ctx.fillText('en 30 secondes',W/2,y+100)
  const boxY=y+150,boxH=180
  ctx.fillStyle='#fff8e1'
  roundRect(ctx,100,boxY,W-200,boxH,25);ctx.fill()
  ctx.strokeStyle='#f5c842';ctx.lineWidth=4
  ctx.setLineDash([12,8]);ctx.stroke();ctx.setLineDash([])
  ctx.font='56px Arial'
  ctx.fillText('🎁',W/2,boxY+60)
  ctx.fillStyle='#333';ctx.font='600 28px "DM Sans",Arial'
  ctx.fillText('Laissez un avis et tentez de gagner',W/2,boxY+100)
  ctx.fillStyle='#ff6b35';ctx.font='900 38px "DM Sans",Arial'
  const lotLines=wrap(ctx,commerce.lot||'un cadeau',W-240)
  ctx.fillText(lotLines[0]||'un cadeau',W/2,boxY+150)
  // QR CODE DESSINE AVEC drawImage (l image est deja chargee)
  const qrX=(W-520)/2,qrY=boxY+boxH+80
  ctx.fillStyle='#fff';ctx.fillRect(qrX-20,qrY-20,560,560)
  ctx.strokeStyle='#f0f0f0';ctx.lineWidth=4
  ctx.strokeRect(qrX-20,qrY-20,560,560)
  ctx.drawImage(qrImg,qrX,qrY,520,520)
  ctx.fillStyle='#666';ctx.font='600 30px "DM Sans",Arial'
  ctx.fillText('Scannez avec votre telephone',W/2,qrY+590)
  ctx.fillStyle='#aaa';ctx.font='600 20px "DM Sans",Arial'
  ctx.fillText('Propulse par',W/2,H-60)
  ctx.fillStyle='#0a0a0a';ctx.font='900 26px "DM Sans",Arial'
  ctx.fillText('REVIEWO',W/2,H-28)
  return canvas
}

async function drawCard(targetCanvas){
  const W=591,H=886
  const canvas=targetCanvas||document.createElement('canvas')
  canvas.width=W;canvas.height=H
  const ctx=canvas.getContext('2d')
  const voteLink=window.location.origin+'/vote.html?c='+commerce.id
  const qrImg=await loadQRImage(voteLink,320)
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H)
  ctx.fillStyle='#f5c842';ctx.fillRect(0,0,W,12)
  ctx.textAlign='center'
  ctx.fillStyle='#0a0a0a'
  ctx.font='900 44px "Fraunces",Georgia,serif'
  const nomLines=wrap(ctx,commerce.nom,W-60)
  let y=80
  nomLines.forEach(l=>{ctx.fillText(l,W/2,y);y+=52})
  ctx.fillStyle='#f5c842';ctx.fillRect(W/2-25,y,50,5)
  y+=35
  ctx.fillStyle='#333';ctx.font='500 22px "DM Sans",Arial'
  ctx.fillText('Votre avis compte !',W/2,y+20)
  ctx.fillStyle='#0a0a0a';ctx.font='800 24px "DM Sans",Arial'
  ctx.fillText('En 30 secondes',W/2,y+52)
  const boxY=y+85
  ctx.fillStyle='#fff8e1'
  roundRect(ctx,40,boxY,W-80,100,14);ctx.fill()
  ctx.strokeStyle='#f5c842';ctx.lineWidth=3
  ctx.setLineDash([8,6]);ctx.stroke();ctx.setLineDash([])
  ctx.font='26px Arial'
  ctx.fillText('🎁',W/2,boxY+30)
  ctx.fillStyle='#333';ctx.font='600 16px "DM Sans",Arial'
  ctx.fillText('Tentez de gagner',W/2,boxY+55)
  ctx.fillStyle='#ff6b35';ctx.font='800 20px "DM Sans",Arial'
  const lotLines=wrap(ctx,commerce.lot||'un cadeau',W-120)
  ctx.fillText(lotLines[0]||'un cadeau',W/2,boxY+82)
  const qrX=(W-320)/2,qrY=boxY+130
  ctx.fillStyle='#fff';ctx.fillRect(qrX-10,qrY-10,340,340)
  ctx.strokeStyle='#f0f0f0';ctx.lineWidth=3
  ctx.strokeRect(qrX-10,qrY-10,340,340)
  ctx.drawImage(qrImg,qrX,qrY,320,320)
  ctx.fillStyle='#666';ctx.font='600 16px "DM Sans",Arial'
  ctx.fillText('Scannez-moi',W/2,qrY+365)
  ctx.fillStyle='#aaa';ctx.font='600 11px "DM Sans",Arial'
  ctx.fillText('Propulse par REVIEWO',W/2,H-20)
  return canvas
}

  h+='<label class="input-label">Lot a faire gagner</label>'
  h+='<input type="text" class="input" id="lot-input" value="'+(commerce.lot||'')+'" placeholder="Bon achat 50 euros">'
  h+='<button class="btn btn-ghost" style="width:auto;padding:8px 14px;font-size:12px;margin-top:0" onclick="saveLot()">Enregistrer</button>'
  h+='<div class="lot-stats"><span style="font-size:13px;color:#888">Participants eligibles</span><span class="lot-count">'+elig.length+'</span></div>'
  h+='</div>'
  h+='<button class="btn btn-gold" onclick="doTirage()"'+(elig.length===0?' disabled':'')+'>'+(elig.length===0?'Aucun participant':'Lancer le tirage')+'</button>'
  if(lt){h+='<div class="winner-box"><div class="winner-title">Dernier gagnant</div><div class="winner-phone">'+lt.telephone_gagnant+'</div><div style="font-size:12px;color:#666;margin-top:6px">Lot: '+lt.lot+'</div></div>'}
  h+='</div></div>'
  const now=new Date()
  const trialEnd=commerce.trial_end?new Date(commerce.trial_end):null
  const daysLeft=trialEnd?Math.ceil((trialEnd-now)/(1000*60*60*24)):0
  let subClass='trial',subBadge='trial',subLabel='Essai gratuit',subDetails=''
  if(commerce.statut==='active'){
    subClass='active';subBadge='active';subLabel='Abonnement actif'
    subDetails='<div class="sub-detail">Montant : <strong>'+(commerce.montant_mensuel||29)+'€/mois</strong></div>'
  }else if(commerce.statut==='cancelled'){
    subClass='expired';subBadge='expired';subLabel='Annule'
  }else if(daysLeft>0){
    subDetails='<div class="sub-detail">Il reste <strong>'+daysLeft+' jour(s)</strong></div>'
  }else{
    subClass='expired';subBadge='expired';subLabel='Essai expire'
  }
  h+='<div id="section-profil" style="display:none">'
  h+='<div class="sub-hero '+subClass+'">'
  h+='<span class="sub-badge '+subBadge+'">'+subLabel+'</span>'
  h+='<div class="sub-title">Mon abonnement</div>'+subDetails
  if(commerce.statut!=='active'){h+='<button class="btn" onclick="subscribeNow()">S abonner maintenant</button>'}
  h+='</div>'
  h+='<div class="card"><div class="card-title">👤 Informations</div>'
  h+='<label class="input-label">Nom</label><input type="text" class="input" id="edit-nom" value="'+(commerce.nom||'')+'">'
  h+='<label class="input-label">Email</label><input type="email" class="input" id="edit-email" value="'+(commerce.email||'')+'">'
  h+='<label class="input-label">Telephone</label><input type="tel" class="input" id="edit-tel" value="'+(commerce.telephone||'')+'">'
  h+='<label class="input-label">Lien Google</label><input type="url" class="input" id="edit-google" value="'+(commerce.lien_google||'')+'">'
  h+='<button class="btn" onclick="saveProfile()">💾 Enregistrer</button>'
  h+='</div>'
  h+='<div class="card"><div class="card-title">🔒 Mot de passe</div>'
  h+='<input type="password" class="input" id="new-pwd" placeholder="Nouveau mot de passe">'
  h+='<input type="password" class="input" id="new-pwd2" placeholder="Confirmer">'
  h+='<button class="btn btn-ghost" onclick="changePassword()">Mettre a jour</button>'
  h+='</div>'
  h+='<div class="card"><div class="card-title" style="color:#ef4444">⚠️ Zone dangereuse</div>'
  if(commerce.statut==='active'){
    h+='<div class="danger-zone"><div class="danger-zone-title">Se desabonner</div><div class="danger-zone-desc">Annule l abonnement.</div><button class="btn btn-danger" onclick="unsubscribe()">Annuler abonnement</button></div>'
  }
  h+='<div class="danger-zone" style="margin-top:10px"><div class="danger-zone-title">Supprimer compte</div><div class="danger-zone-desc">Action irreversible.</div><button class="btn btn-danger" onclick="deleteAccount()">Supprimer</button></div>'
  h+='</div></div>'
  document.getElementById('content').innerHTML=h
  // Dessiner les apercus APRES affichage du HTML
  try{
    const a4Wrap=document.getElementById('preview-a4-wrap')
    const cdWrap=document.getElementById('preview-card-wrap')
    if(a4Wrap){
      const c=await drawA4()
      c.className='preview-canvas'
      a4Wrap.innerHTML=''
      a4Wrap.appendChild(c)
    }
    if(cdWrap){
      const c=await drawCard()
      c.className='preview-canvas'
      cdWrap.innerHTML=''
      cdWrap.appendChild(c)
    }
  }catch(e){
    console.error('Erreur dessin:',e)
  }
}

window.showMainTab=function(tab){
  ['overview','affiches','avis','tirage','profil'].forEach(t=>{
    const sec=document.getElementById('section-'+t)
    const btn=document.getElementById('mt-'+t)
    if(sec)sec.style.display=t===tab?'block':'none'
    if(btn)btn.classList.toggle('active',t===tab)
  })
}
window.showFormat=function(f){
  document.getElementById('format-a4-box').style.display=f==='a4'?'block':'none'
  document.getElementById('format-card-box').style.display=f==='card'?'block':'none'
  document.getElementById('fmt-a4').classList.toggle('active',f==='a4')
  document.getElementById('fmt-card').classList.toggle('active',f==='card')
}
window.showTab=function(tab){
  document.getElementById('tab-google').style.display=tab==='google'?'block':'none'
  document.getElementById('tab-interne').style.display=tab==='interne'?'block':'none'
  document.getElementById('tab-google-btn').classList.toggle('active',tab==='google')
  document.getElementById('tab-interne-btn').classList.toggle('active',tab==='interne')
}
window.downloadA4=async function(){
  try{
    const c=await drawA4()
    const l=document.createElement('a')
    l.download='reviewo-affiche-A4.png'
    l.href=c.toDataURL('image/png')
    l.click()
  }catch(e){alert('Erreur: '+e.message)}
}
window.downloadCard=async function(){
  try{
    const c=await drawCard()
    const l=document.createElement('a')
    l.download='reviewo-carte-table.png'
    l.href=c.toDataURL('image/png')
    l.click()
  }catch(e){alert('Erreur: '+e.message)}
}
window.saveLot=async function(){
  const nl=document.getElementById('lot-input').value.trim()
  if(!nl)return alert('Saisir un lot')
  const {error}=await supabase.from('commerces').update({lot:nl}).eq('id',commerce.id)
  if(error)return alert('Erreur')
  commerce.lot=nl
  alert('Lot enregistre')
  render()
}
window.saveProfile=async function(){
  const nom=document.getElementById('edit-nom').value.trim()
  const email=document.getElementById('edit-email').value.trim()
  const tel=document.getElementById('edit-tel').value.trim()
  const google=document.getElementById('edit-google').value.trim()
  if(!nom||!email)return alert('Nom et email obligatoires')
  const {error}=await supabase.from('commerces').update({nom:nom,email:email,telephone:tel||null,lien_google:google||null}).eq('id',commerce.id)
  if(error)return alert('Erreur')
  commerce.nom=nom;commerce.email=email;commerce.telephone=tel;commerce.lien_google=google
  alert('✅ Enregistre')
  render()
}
window.changePassword=async function(){
  const p1=document.getElementById('new-pwd').value
  const p2=document.getElementById('new-pwd2').value
  if(!p1||p1.length<6)return alert('Min 6 caracteres')
  if(p1!==p2)return alert('Mots de passe differents')
  const {error}=await supabase.auth.updateUser({password:p1})
  if(error)return alert('Erreur')
  alert('✅ Mot de passe mis a jour')
}
window.subscribeNow=function(){window.location.href=STRIPE_LINK}
window.unsubscribe=async function(){
  if(!confirm('Annuler abonnement ?'))return
  await supabase.from('commerces').update({statut:'cancelled'}).eq('id',commerce.id)
  alert('Annule')
  load()
}
window.deleteAccount=async function(){
  if(!confirm('⚠️ Supprimer DEFINITIVEMENT ?'))return
  if(prompt('Tapez SUPPRIMER')!=='SUPPRIMER')return
  await supabase.from('avis').delete().eq('commerce_id',commerce.id)
  await supabase.from('tirages').delete().eq('commerce_id',commerce.id)
  await supabase.from('clients').delete().eq('commerce_id',commerce.id)
  await supabase.from('commerces').delete().eq('id',commerce.id)
  await supabase.auth.signOut()
  window.location.href='/'
}
window.doTirage=async function(){
  const elig=avis.filter(a=>a.redirige_google&&a.telephone)
  if(elig.length===0)return alert('Aucun participant')
  if(!confirm('Lancer le tirage parmi '+elig.length+' ?'))return
  const w=elig[Math.floor(Math.random()*elig.length)]
  await supabase.from('tirages').insert({commerce_id:commerce.id,avis_id:w.id,lot:commerce.lot||'Lot',telephone_gagnant:w.telephone,mois:new Date().toLocaleDateString('fr-FR',{month:'long',year:'numeric'})})
  alert('Gagnant: '+w.telephone)
  load()
}
window.logout=async function(){
  await supabase.auth.signOut()
  window.location.href='/inscription.html'
}
load().then(()=>checkPayment())
</script>
</body>
</html>
