<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reviewo Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#f2efe8;font-family:'DM Sans',sans-serif;min-height:100vh;padding:20px}
.container{max-width:1000px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid #1f1f1f}
.logo{font-family:'Fraunces',serif;font-size:24px;font-weight:900}
.logo span{color:#00e676}
.logout{background:transparent;color:#666;border:1px solid #1f1f1f;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px}
.welcome{font-family:'Fraunces',serif;font-size:28px;font-weight:900;margin-bottom:6px}
.welcome em{color:#00e676;font-style:italic}
.sub{color:#666;margin-bottom:28px;font-size:14px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:#131313;border:1px solid #1f1f1f;border-radius:14px;padding:18px}
.stat-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.stat-value{font-family:'Fraunces',serif;font-size:28px;font-weight:900}
.stat-value.green{color:#00e676}
.stat-sub{font-size:12px;color:#666;margin-top:4px}
.card{background:#131313;border:1px solid #1f1f1f;border-radius:14px;padding:22px;margin-bottom:16px}
.card-title{font-family:'Fraunces',serif;font-size:16px;font-weight:700;margin-bottom:16px}
.btn{background:#00e676;color:#0a0a0a;border:none;padding:12px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;width:100%}
.btn:disabled{opacity:.4}
.btn-gold{background:#f5c842;color:#0a0a0a}
.btn-ghost{background:transparent;color:#f2efe8;border:1px solid #1f1f1f}
.poster-preview{background:#fff;border-radius:14px;padding:20px;margin-bottom:14px;display:flex;justify-content:center}
.poster{width:420px;background:#fffbed;border:2px solid #f5c842;border-radius:20px;padding:36px 28px;text-align:center;color:#0a0a0a}
.poster-eyebrow{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:#ff6b35;margin-bottom:14px}
.poster-biz{font-family:'Fraunces',serif;font-size:30px;font-weight:900;margin-bottom:8px}
.poster-divider{width:50px;height:3px;background:#f5c842;margin:14px auto}
.poster-msg{font-size:17px;margin-bottom:20px;color:#333}
.poster-gift-box{background:#fff;border:2px solid #f5c842;border-radius:14px;padding:14px;margin-bottom:20px;font-size:14px;font-weight:600}
.poster-gift-box strong{color:#ff6b35;font-size:16px}
.poster-qr-wrap{background:#fff;padding:14px;border-radius:14px;display:inline-block}
.poster-qr-wrap img{display:block;width:180px;height:180px}
.poster-footer{margin-top:18px;font-size:10px;color:#999}
.poster-footer strong{color:#0a0a0a}
.lot-box{background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.2);border-radius:12px;padding:18px;margin-bottom:14px}
.lot-input{width:100%;background:#0a0a0a;border:1.5px solid #1f1f1f;border-radius:10px;padding:12px;color:#f2efe8;font-size:14px;outline:none;margin-bottom:10px}
.lot-stats{display:flex;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid rgba(245,200,66,.15)}
.lot-count{font-family:'Fraunces',serif;font-size:22px;font-weight:900;color:#f5c842}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab-btn{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #1f1f1f;background:transparent;color:#f2efe8}
.tab-btn.active{background:#00e676;color:#0a0a0a;border:none}
.review-google{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid #1f1f1f;align-items:center}
.review-google:last-child{border:none}
.review-avatar{width:40px;height:40px;border-radius:10px;background:#1f1f1f;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.review-interne{background:#1a1a1a;border-radius:12px;padding:16px;margin-bottom:10px;border-left:3px solid #ef4444}
.review-time{font-size:11px;color:#666}
.stars-display{font-size:16px}
.review-comment{font-size:14px;color:#f2efe8;line-height:1.6;font-style:italic;margin:10px 0;padding:10px;background:#0a0a0a;border-radius:8px}
.problem-tag{background:rgba(239,68,68,.15);color:#ef4444;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block;margin:2px}
.phone-info{font-size:12px;color:#888;margin-top:4px}
.winner-box{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.3);border-radius:12px;padding:18px;margin-top:14px;text-align:center}
.winner-title{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:#00e676;margin-bottom:8px}
.winner-phone{font-family:monospace;font-size:20px;font-weight:700}
.empty{text-align:center;padding:40px;color:#666}
.loading{text-align:center;padding:40px;color:#666}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1f1f1f;font-size:13px}
.info-row .label{color:#666}
@media(max-width:768px){.stats-grid{grid-template-columns:1fr 1fr}.poster{width:340px;padding:28px 22px}.poster-biz{font-size:24px}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div class="logo">Reviewo<span>.</span></div>
<button class="logout" onclick="logout()">Deconnexion</button>
</div>
<div id="content" class="loading">Chargement...</div>
</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient('https://xivfhmivalfcnbkvxwbm.supabase.co','sb_publishable_Czi3OLTboQSGmP2nA0NBUQ_koXPrn5x')
let commerce=null,avis=[]
async function load(){
  const {data:{session}}=await supabase.auth.getSession()
  if(!session){window.location.href='/inscription.html';return}
  const {data:c}=await supabase.from('commerces').select('*').eq('user_id',session.user.id).single()
  if(!c){document.getElementById('content').innerHTML='Commerce introuvable';return}
  commerce=c
  const {data:a}=await supabase.from('avis').select('*').eq('commerce_id',c.id).order('created_at',{ascending:false})
  avis=a||[]
  render()
}
async function render(){
  const total=avis.length
  const gc=avis.filter(a=>a.redirige_google).length
  const avg=total>0?(avis.reduce((s,a)=>s+a.note,0)/total).toFixed(1):'-'
  const rate=total>0?Math.round((gc/total)*100):0
  const voteLink=window.location.origin+'/vote.html?c='+commerce.id
  const qr='https://api.qrserver.com/v1/create-qr-code/?size=360x360&margin=10&data='+encodeURIComponent(voteLink)
  const month=new Date().toLocaleDateString('fr-FR',{month:'long',year:'numeric'})
  const elig=avis.filter(a=>a.redirige_google&&a.telephone)
  const googleAvis=avis.filter(a=>a.redirige_google)
  const interneAvis=avis.filter(a=>!a.redirige_google)
  const {data:tirages}=await supabase.from('tirages').select('*').eq('commerce_id',commerce.id).order('created_at',{ascending:false})
  const lt=tirages&&tirages[0]
  let h='<h1 class="welcome">Bienvenue, <em>'+commerce.nom+'</em></h1>'
  h+='<p class="sub">Tableau de bord - '+month+'</p>'
  h+='<div class="stats-grid">'
  h+='<div class="stat"><div class="stat-label">Avis collectes</div><div class="stat-value">'+total+'</div><div class="stat-sub">Depuis le debut</div></div>'
  h+='<div class="stat"><div class="stat-label">Rediriges Google</div><div class="stat-value green">'+gc+'</div><div class="stat-sub">'+rate+'%</div></div>'
  h+='<div class="stat"><div class="stat-label">Note moyenne</div><div class="stat-value">'+avg+'</div><div class="stat-sub">Sur 5</div></div>'
  h+='<div class="stat"><div class="stat-label">Plan</div><div class="stat-value green" style="font-size:22px">'+commerce.plan+'</div><div class="stat-sub">Actif</div></div>'
  h+='</div>'
  h+='<div class="card"><div class="card-title">Votre affiche Reviewo</div>'
  h+='<p style="font-size:13px;color:#666;margin-bottom:16px">Telechargez, imprimez et collez a la caisse.</p>'
  h+='<div class="poster-preview"><div class="poster" id="poster">'
  h+='<div class="poster-eyebrow">Votre avis compte</div>'
  h+='<div class="poster-biz">'+commerce.nom+'</div>'
  h+='<div class="poster-divider"></div>'
  h+='<div class="poster-msg">Aidez-nous en <strong>30 secondes</strong></div>'
  h+='<div class="poster-gift-box">Laissez un avis et tentez de gagner<br><strong>'+(commerce.lot||'un cadeau')+'</strong></div>'
  h+='<div class="poster-qr-wrap"><img src="'+qr+'" alt="QR" crossorigin="anonymous"></div>'
  h+='<div class="poster-footer">Propulse par <strong>REVIEWO</strong></div>'
  h+='</div></div>'
  h+='<button class="btn" onclick="downloadPoster()">Telecharger l affiche</button>'
  h+='</div>'
  h+='<div class="card"><div class="card-title">Tirage au sort mensuel</div>'
  h+='<div class="lot-box">'
  h+='<label style="font-size:12px;color:#666;display:block;margin-bottom:6px">Lot a faire gagner</label>'
  h+='<input type="text" class="lot-input" id="lot-input" value="'+(commerce.lot||'')+'" placeholder="Bon achat 50 euros">'
  h+='<button class="btn btn-ghost" style="width:auto;padding:8px 14px;font-size:12px" onclick="saveLot()">Enregistrer</button>'
  h+='<div class="lot-stats"><span style="font-size:13px;color:#888">Participants eligibles</span><span class="lot-count">'+elig.length+'</span></div>'
  h+='</div>'
  h+='<button class="btn btn-gold" onclick="doTirage()"'+(elig.length===0?' disabled':'')+'>'+(elig.length===0?'Aucun participant':'Lancer le tirage')+'</button>'
  if(lt){h+='<div class="winner-box"><div class="winner-title">Dernier gagnant</div><div class="winner-phone">'+lt.telephone_gagnant+'</div><div style="font-size:12px;color:#666;margin-top:6px">Lot: '+lt.lot+'</div></div>'}
  h+='</div>'
  h+='<div class="card"><div class="card-title">Avis recus</div>'
  h+='<div class="tabs">'
  h+='<button class="tab-btn active" id="tab-google-btn" onclick="showTab(\'google\')">Google ('+googleAvis.length+')</button>'
  h+='<button class="tab-btn" id="tab-interne-btn" onclick="showTab(\'interne\')">A ameliorer ('+interneAvis.length+')</button>'
  h+='</div>'
  h+='<div id="tab-google">'
  if(googleAvis.length===0){h+='<div class="empty">Aucun avis Google pour le moment</div>'}
  else{googleAvis.slice(0,20).forEach(a=>{
    const stars='⭐'.repeat(a.note)
    const d=new Date(a.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})
    h+='<div class="review-google">'
    h+='<div class="review-avatar">😊</div>'
    h+='<div style="flex:1">'
    h+='<div style="display:flex;justify-content:space-between;align-items:center"><span class="stars-display">'+stars+'</span><span class="review-time">'+d+'</span></div>'
    if(a.telephone)h+='<div class="phone-info">📞 '+a.telephone+'</div>'
    h+='</div></div>'
  })}
  h+='</div>'
  h+='<div id="tab-interne" style="display:none">'
  if(interneAvis.length===0){h+='<div class="empty">Aucun retour negatif - bravo !</div>'}
  else{interneAvis.slice(0,20).forEach(a=>{
    const stars='⭐'.repeat(a.note)+'☆'.repeat(5-a.note)
    const d=new Date(a.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})
    const emoji=a.note>=3?'😐':'😞'
    h+='<div class="review-interne">'
    h+='<div style="display:flex;justify-content:space-between;align-items:center">'
    h+='<div style="display:flex;gap:10px;align-items:center"><span style="font-size:22px">'+emoji+'</span><span class="stars-display">'+stars+'</span></div>'
    h+='<span class="review-time">'+d+'</span>'
    h+='</div>'
    if(a.commentaire)h+='<div class="review-comment">"'+a.commentaire+'"</div>'
    if(a.problemes&&a.problemes.length>0){
      h+='<div style="margin-top:8px">'
      a.problemes.forEach(p=>{h+='<span class="problem-tag">'+p+'</span>'})
      h+='</div>'
    }
    h+='</div>'
  })}
  h+='</div>'
  h+='</div>'
  h+='<div class="card"><div class="card-title">Informations</div>'
  h+='<div class="info-row"><span class="label">Nom</span><span>'+commerce.nom+'</span></div>'
  h+='<div class="info-row"><span class="label">Email</span><span>'+commerce.email+'</span></div>'
  h+='<div class="info-row"><span class="label">Lien Google</span><span style="font-size:11px">'+(commerce.lien_google||'Non configure')+'</span></div>'
  h+='</div>'
  document.getElementById('content').innerHTML=h
}
window.showTab=function(tab){
  document.getElementById('tab-google').style.display=tab==='google'?'block':'none'
  document.getElementById('tab-interne').style.display=tab==='interne'?'block':'none'
  document.getElementById('tab-google-btn').classList.toggle('active',tab==='google')
  document.getElementById('tab-interne-btn').classList.toggle('active',tab==='interne')
}
window.downloadPoster=async function(){
  const p=document.getElementById('poster')
  const c=await html2canvas(p,{scale:3,useCORS:true})
  const l=document.createElement('a')
  l.download='reviewo-affiche.png'
  l.href=c.toDataURL('image/png')
  l.click()
}
window.saveLot=async function(){
  const nl=document.getElementById('lot-input').value.trim()
  if(!nl)return alert('Saisir un lot')
  const {error}=await supabase.from('commerces').update({lot:nl}).eq('id',commerce.id)
  if(error)return alert('Erreur')
  commerce.lot=nl
  alert('Lot enregistre')
  render()
}
window.doTirage=async function(){
  const elig=avis.filter(a=>a.redirige_google&&a.telephone)
  if(elig.length===0)return alert('Aucun participant')
  if(!confirm('Lancer le tirage parmi '+elig.length+' participants?'))return
  const w=elig[Math.floor(Math.random()*elig.length)]
  const m=new Date().toLocaleDateString('fr-FR',{month:'long',year:'numeric'})
  const {error}=await supabase.from('tirages').insert({commerce_id:commerce.id,avis_id:w.id,lot:commerce.lot||'Lot',telephone_gagnant:w.telephone,mois:m})
  if(error)return alert('Erreur')
  alert('Gagnant: '+w.telephone)
  load()
}
window.logout=async function(){
  await supabase.auth.signOut()
  window.location.href='/inscription.html'
}
load()
</script>
</body>
</html>
