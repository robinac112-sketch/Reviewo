<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votre avis compte</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#f2efe8;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{max-width:480px;width:100%;background:#131313;border:1px solid #1f1f1f;border-radius:20px;padding:32px 24px;text-align:center}
.logo{font-family:'Fraunces',serif;font-size:22px;font-weight:900;margin-bottom:8px}
.logo span{color:#00e676}
.biz-name{font-family:'Fraunces',serif;font-size:28px;font-weight:900;margin-bottom:8px}
.sub{color:#888;font-size:14px;margin-bottom:28px}
.question{font-family:'Fraunces',serif;font-size:22px;font-weight:700;margin-bottom:24px;line-height:1.3}
.stars{display:flex;justify-content:center;gap:8px;margin-bottom:28px}
.star{font-size:44px;cursor:pointer;transition:transform .15s;filter:grayscale(1);opacity:.3}
.star.active{filter:none;opacity:1;transform:scale(1.1)}
.star:hover{transform:scale(1.15)}
.btn{background:#00e676;color:#0a0a0a;border:none;padding:14px 20px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:8px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;color:#f2efe8;border:1px solid #1f1f1f}
.screen{display:none}
.screen.active{display:block}
.problems{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px}
.problem-btn{background:#0a0a0a;border:1.5px solid #1f1f1f;color:#f2efe8;padding:10px 14px;border-radius:10px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500}
.problem-btn.selected{background:#ef4444;border-color:#ef4444;color:#fff}
.input,.textarea{width:100%;background:#0a0a0a;border:1.5px solid #1f1f1f;border-radius:10px;padding:14px;color:#f2efe8;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:12px}
.textarea{min-height:100px;resize:vertical}
.input:focus,.textarea:focus{border-color:#00e676}
.label{font-size:13px;color:#888;text-align:left;display:block;margin-bottom:6px}
.success-icon{font-size:64px;margin-bottom:16px}
.gift-box{background:linear-gradient(135deg,rgba(245,200,66,.1),rgba(255,107,53,.05));border:1px solid rgba(245,200,66,.3);border-radius:14px;padding:18px;margin:16px 0}
.gift-title{font-family:'Fraunces',serif;font-size:18px;color:#f5c842;font-weight:700;margin-bottom:6px}
.gift-sub{font-size:13px;color:#aaa}
.loading{text-align:center;padding:40px;color:#666}
.consent-box{background:#0a0a0a;border:1px solid #1f1f1f;border-radius:12px;padding:14px;margin-bottom:14px;text-align:left}
.consent-item{display:flex;gap:10px;align-items:flex-start;cursor:pointer;padding:8px 0}
.consent-item input{width:22px;height:22px;flex-shrink:0;accent-color:#00e676;cursor:pointer;margin-top:2px}
.consent-item label{font-size:13px;color:#ccc;line-height:1.5;cursor:pointer;flex:1}
.consent-item.required label::after{content:' *';color:#ef4444;font-weight:700}
.consent-info{font-size:11px;color:#666;line-height:1.5;margin-top:8px;padding-top:8px;border-top:1px solid #1f1f1f}
.blocked-icon{font-size:72px;margin-bottom:20px;opacity:.7}
.blocked-title{font-family:'Fraunces',serif;font-size:26px;font-weight:900;margin-bottom:14px;line-height:1.2}
.blocked-text{color:#aaa;font-size:14px;line-height:1.7}
</style>
</head>
<body>
<div class="container">
<div id="content" class="loading">Chargement...</div>
</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient('https://xivfhmivalfcnbkvxwbm.supabase.co','sb_publishable_Czi3OLTboQSGmP2nA0NBUQ_koXPrn5x')
const params=new URLSearchParams(window.location.search)
const commerceId=params.get('c')
let commerce=null,selectedNote=0,selectedProblems=[]

async function load(){
  if(!commerceId){
    document.getElementById('content').innerHTML=renderInvalid()
    return
  }
  const {data:c}=await supabase.from('commerces').select('*').eq('id',commerceId).single()
  if(!c){
    document.getElementById('content').innerHTML=renderInvalid()
    return
  }
  commerce=c
  const now=new Date()
  const trialEnd=c.trial_end?new Date(c.trial_end):null
  const isTrialValid=trialEnd&&trialEnd>now
  const isActive=c.statut==='active'
  const isCancelled=c.statut==='cancelled'
  if(isCancelled||(!isActive&&!isTrialValid)){
    renderBlocked()
    return
  }
  renderRating()
}

function renderInvalid(){
  let h='<div class="blocked-icon">⚠️</div>'
  h+='<div class="blocked-title">Lien invalide</div>'
  h+='<p class="blocked-text">Ce lien ne correspond a aucun commerce.</p>'
  return h
}

function renderBlocked(){
  let h='<div class="blocked-icon">🔒</div>'
  h+='<div class="blocked-title">Service momentanement indisponible</div>'
  h+='<p class="blocked-text">Ce commerce n accepte pas d avis pour le moment.<br><br>Merci de votre comprehension.</p>'
  document.getElementById('content').innerHTML=h
}

function renderRating(){
  let h='<div class="logo">Reviewo<span>.</span></div>'
  h+='<div class="biz-name">'+commerce.nom+'</div>'
  h+='<p class="sub">Votre avis compte pour nous</p>'
  h+='<div class="question">Comment evaluez-vous votre experience ?</div>'
  h+='<div class="stars">'
  for(let i=1;i<=5;i++){h+='<span class="star" data-note="'+i+'" onclick="selectNote('+i+')">⭐</span>'}
  h+='</div>'
  h+='<button class="btn" id="validate-btn" onclick="validateNote()" disabled>Valider</button>'
  document.getElementById('content').innerHTML=h
}

window.selectNote=function(n){
  selectedNote=n
  document.querySelectorAll('.star').forEach(s=>{
    const sn=parseInt(s.dataset.note)
    s.classList.toggle('active',sn<=n)
  })
  document.getElementById('validate-btn').disabled=false
}

window.validateNote=function(){
  if(selectedNote>=4){renderGoogleScreen()}
  else{renderInternalScreen()}
}

function renderGoogleScreen(){
  let h='<div class="success-icon">🎉</div>'
  h+='<div class="question">Merci pour votre '+selectedNote+' etoiles !</div>'
  h+='<p class="sub">Aidez-nous en laissant un avis sur Google</p>'
  h+='<div class="gift-box">'
  h+='<div class="gift-title">🎁 Tentez de gagner</div>'
  h+='<div class="gift-sub">'+(commerce.lot||'un cadeau')+'</div>'
  h+='</div>'
  h+='<label class="label">Votre numero de telephone (pour le tirage au sort)</label>'
  h+='<input type="tel" class="input" id="tel-input" placeholder="06 12 34 56 78">'
  h+='<div class="consent-box">'
  h+='<div class="consent-item required">'
  h+='<input type="checkbox" id="consent-concours">'
  h+='<label for="consent-concours">J accepte de participer au jeu concours organise par <strong>'+commerce.nom+'</strong> et d etre contacte par telephone si je gagne</label>'
  h+='</div>'
  h+='<div class="consent-item">'
  h+='<input type="checkbox" id="consent-marketing">'
  h+='<label for="consent-marketing">J accepte de recevoir des offres et actualites de <strong>'+commerce.nom+'</strong></label>'
  h+='</div>'
  h+='<div class="consent-info">* Consentement obligatoire pour participer. Vos donnees sont utilisees uniquement dans le cadre du tirage au sort et conservees 3 mois maximum. Conformement au RGPD, vous pouvez demander la suppression a tout moment.</div>'
  h+='</div>'
  h+='<button class="btn" onclick="submitGoogle()">Continuer vers Google</button>'
  h+='<button class="btn btn-ghost" onclick="skipTel()" style="margin-top:10px">Passer le concours</button>'
  document.getElementById('content').innerHTML=h
}

function renderInternalScreen(){
  let h='<div class="question">Desolee pour cette experience</div>'
  h+='<p class="sub">Aidez-nous a nous ameliorer</p>'
  h+='<label class="label">Quels problemes avez-vous rencontres ?</label>'
  h+='<div class="problems">'
  const probs=['Qualite','Attente','Accueil','Proprete','Prix','Autre']
  probs.forEach(p=>{h+='<button class="problem-btn" onclick="toggleProblem(\''+p+'\',this)">'+p+'</button>'})
  h+='</div>'
  h+='<label class="label">Dites-nous en plus (optionnel)</label>'
  h+='<textarea class="textarea" id="comment-input" placeholder="Votre message..."></textarea>'
  h+='<button class="btn" onclick="submitInternal()">Envoyer</button>'
  document.getElementById('content').innerHTML=h
}

window.toggleProblem=function(p,el){
  if(selectedProblems.includes(p)){
    selectedProblems=selectedProblems.filter(x=>x!==p)
    el.classList.remove('selected')
  }else{
    selectedProblems.push(p)
    el.classList.add('selected')
  }
}

window.submitGoogle=async function(){
  const tel=document.getElementById('tel-input').value.trim()
  const consentConcours=document.getElementById('consent-concours').checked
  const consentMarketing=document.getElementById('consent-marketing').checked
  if(!tel){alert('Veuillez entrer votre telephone ou cliquez sur Passer le concours');return}
  if(!consentConcours){alert('Vous devez accepter de participer au jeu concours pour continuer');return}
  await supabase.from('avis').insert({
    commerce_id:commerce.id,note:selectedNote,telephone:tel,redirige_google:true,
    consent_concours:consentConcours,consent_marketing:consentMarketing
  })
  window.location.href=commerce.lien_google||'https://google.com'
}

window.skipTel=async function(){
  await supabase.from('avis').insert({
    commerce_id:commerce.id,note:selectedNote,redirige_google:true,
    consent_concours:false,consent_marketing:false
  })
  window.location.href=commerce.lien_google||'https://google.com'
}

window.submitInternal=async function(){
  const comment=document.getElementById('comment-input').value.trim()
  const {error}=await supabase.from('avis').insert({
    commerce_id:commerce.id,note:selectedNote,redirige_google:false,
    problemes:selectedProblems.length>0?selectedProblems:null,
    commentaire:comment!==''?comment:null
  })
  if(error){alert('Erreur: '+error.message);return}
  let h='<div class="success-icon">🙏</div>'
  h+='<div class="question">Merci pour votre retour</div>'
  h+='<p class="sub">Votre avis a ete transmis au gerant.<br>Il en tiendra compte pour ameliorer son service.</p>'
  document.getElementById('content').innerHTML=h
}

load()
</script>
</body>
</html>
